name: qalam
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Phase-1 dependency set — versions verified in 01-RESEARCH.md §Standard Stack.
  flutter_riverpod: ^3.3.1        # state management (Riverpod only — D-11)
  riverpod_annotation: ^4.0.2     # codegen annotations
  drift: ^2.31.0                  # local SQLite persistence (D-09) — see note
  # NOTE: RESEARCH pinned drift ^2.33.0, but on the installed Flutter 3.41.9
  # (which pins meta 1.17.0) drift_dev 2.32+/2.33 require analyzer >=10, which
  # conflicts with riverpod_lint 3.1.3 (analyzer ^9). Relaxed to the 2.31 line
  # (drift_dev 2.31 allows analyzer >=8.1 <11). Same minor line, no major change.
  sqlite3_flutter_libs: ^0.5.41   # bundles native libsqlite3.so for Android.
  # MUST stay on the 0.5.x line: 0.6.0+eol is an EMPTY end-of-life tombstone that
  # ships NO native code (it pairs with the package:sqlite3 3.x migration). Our
  # stack is drift 2.31 + sqlite3 2.9.4 (2.x), which needs the real 0.5.x build.
  # ^0.6.0 silently dropped libsqlite3.so → boot crash on device (dlopen failed).
  path_provider: ^2.1.0           # locate the on-device DB file
  go_router: ^17.2.3              # declarative routing (D-08)
  flutter_svg: ^2.3.0             # render brand glyph SVGs
  flutter_localizations:          # i18n seam (D-07) — English-only in v1
    sdk: flutter
  google_mlkit_digital_ink_recognition: ^0.14.2
  crypto: ^3.0.7
  # FlutterFire — Phase 06.1 (D-09/D-12/D-16). One compatible generation, added
  # via `flutter pub add` so pub resolves the lockstep set; do NOT hand-pin
  # mismatched majors. firebase_core init + DefaultFirebaseOptions wired in
  # main.dart; firebase_auth = anonymous-at-launch identity (no child PII, D-09b);
  # cloud_firestore is the live curriculum source-of-truth (used from Plan 02 on).
  firebase_core: ^4.11.0          # Firebase app init (qalam-app-bd7d0)
  cloud_firestore: ^6.5.0         # live curriculum reads + offline persistence (D-03)
  firebase_auth: ^6.5.2           # anonymous sign-in + linkWithCredential seam (D-09c)
  # Offline pronunciation playback (S1-06). Plays BUNDLED Flutter assets via
  # AssetSource — no TTS, no network round-trip at trace time (PLAT-01). Package
  # legitimacy approved by the owner at the blocking-human gate (07-02 Checkpoint):
  # audioplayers, latest stable 6.x — long-standing verified-publisher package on
  # pub.dev. Exact resolved version recorded in 07-02-SUMMARY.md + assets/audio/README.md.
  audioplayers: ^6.5.0
  genui: ^0.9.2
  firebase_ai: ^3.13.0
  # SPIKE (Phase 11, throwaway): genui pulls json_schema_builder transitively; the
  # spike's present_activity CatalogItem authors a Schema directly via `S.object`, so
  # it is promoted to a direct dependency. Pinned to the already-resolved transitive
  # version so no other package moves. Remove when the spike is deleted.
  json_schema_builder: ^0.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  mocktail: ^1.0.5                # fakes/mocks for unit tests (HandwritingRecognizer seam)
  build_runner: ^2.15.0           # drives Riverpod + Drift codegen
  riverpod_generator: ^4.0.3      # Riverpod codegen
  riverpod_lint: ^3.1.3           # lint (via analysis_server_plugin, NOT custom_lint)
  drift_dev: ^2.31.0              # Drift codegen — kept aligned with drift (see note above)
  firebase_auth_mocks: ^0.15.2    # in-memory FirebaseAuth fake for the boot-auth test (A5)
  fake_cloud_firestore: ^4.1.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # gen-l10n: generate AppLocalizations from lib/l10n/app_en.arb (D-07).
  generate: true

  assets:
    - assets/audio/
    - assets/curriculum/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/mascot/
    - assets/logo.svg

  # Bundled local TTFs — NO google_fonts/CDN (offline rule, D-03). These
  # families ship only as variable TTFs in the Google Fonts OFL repo; the
  # weight descriptors below select named instances from the weight axis.
  # The family STRING must match TextStyle.fontFamily exactly (Pitfall 3).
  fonts:
    - family: Noto Naskh Arabic   # Arabic content + tracing model letter (never bold)
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
    - family: Cairo               # Arabic display / قلم logo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 600
    - family: Fredoka             # English display / headings / buttons
      fonts:
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 600
    - family: Nunito              # English body / labels
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 600
