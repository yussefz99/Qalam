<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row-bar { display:flex; align-items:center; gap:16px; }
  .bar { background: var(--ink-teal); height: 16px; border-radius: 4px; }
  .lbl { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--fg-muted); width: 70px; }
  .px  { font-family: var(--font-body); font-size: 13px; color: var(--fg); font-weight:600; }
</style>
</head>
<body>
  <div class="col gap-2">
    <div class="row-bar"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
    <div class="row-bar"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
    <div class="row-bar"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
    <div class="row-bar"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="px">16 — min between touch targets</div></div>
    <div class="row-bar"><div class="lbl">space-6</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
    <div class="row-bar"><div class="lbl">space-8</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
    <div class="row-bar"><div class="lbl">space-12</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
    <div class="row-bar"><div class="lbl">space-16</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
    <div class="row-bar"><div class="lbl">space-24</div><div class="bar" style="width:96px"></div><div class="px">96</div></div>
  </div>
</body></html>
