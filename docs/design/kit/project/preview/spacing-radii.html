<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .r { width:96px; height:72px; background: var(--soft-aqua); display:flex; align-items:flex-end; justify-content:center; padding:6px; box-sizing:border-box; box-shadow: var(--shadow-sm); }
  .r > span { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--fg-muted); }
  .label { font-family: var(--font-body); font-weight:700; font-size:12px; color: var(--fg); text-align:center; margin-top:8px; }
</style>
</head>
<body>
  <div class="row gap-3 wrap">
    <div><div class="r" style="border-radius:8px"><span>8</span></div><div class="label">sm</div></div>
    <div><div class="r" style="border-radius:14px"><span>14</span></div><div class="label">md</div></div>
    <div><div class="r" style="border-radius:20px"><span>20</span></div><div class="label">lg · cards</div></div>
    <div><div class="r" style="border-radius:28px"><span>28</span></div><div class="label">xl · canvas</div></div>
    <div><div class="r" style="border-radius:36px"><span>36</span></div><div class="label">2xl</div></div>
    <div><div class="r" style="border-radius:999px"><span>pill</span></div><div class="label">pill · buttons</div></div>
  </div>
</body></html>
