<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { width: 150px; height: 88px; background:#fff; border-radius: var(--radius-lg); display:flex; align-items:center; justify-content:center; font-family: var(--font-body); font-weight:700; color: var(--fg); font-size: 14px; }
  .name { font-family: var(--font-body); font-weight: 700; font-size: 12px; color: var(--fg); text-align: center; margin-top: 8px; }
  .var  { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--fg-muted); text-align: center;}
  .btn  {
    height: 56px; padding: 0 28px; border-radius: 999px;
    background: var(--ink-teal); color: #fff;
    font-family: var(--font-display); font-weight: 600; font-size: 18px;
    border: none; box-shadow: var(--shadow-button); display:flex; align-items:center;
  }
</style>
</head>
<body>
  <div class="row gap-4 wrap" style="align-items:flex-start">
    <div><div class="card" style="box-shadow: var(--shadow-sm)">resting</div><div class="name">shadow-sm</div><div class="var">card</div></div>
    <div><div class="card" style="box-shadow: var(--shadow-md)">lifted</div><div class="name">shadow-md</div><div class="var">card hover</div></div>
    <div><div class="card" style="box-shadow: var(--shadow-lg)">prominent</div><div class="name">shadow-lg</div><div class="var">modal</div></div>
    <div style="padding-top:16px"><button class="btn">Start Lesson</button><div class="name">shadow-button</div><div class="var">flat-bottom · sticker</div></div>
  </div>
</body></html>
