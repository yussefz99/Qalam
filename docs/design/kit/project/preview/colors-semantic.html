<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  table { border-collapse: collapse; font-family: var(--font-body); font-size:14px; width:100%; }
  td { padding:10px 12px; border-bottom: 1px solid var(--border-soft); vertical-align: middle; }
  td:first-child { width: 14px; }
  .dot { width:18px; height:18px; border-radius:6px; display:inline-block; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);}
  .role { font-weight: 700; color: var(--fg); }
  .var { color: var(--fg-muted); font-family: ui-monospace, Menlo, monospace; font-size: 12px;}
</style>
</head>
<body>
  <table>
    <tr><td><span class="dot" style="background:var(--bg)"></span></td><td class="role">Background</td><td><span class="var">--bg</span> → Parchment</td></tr>
    <tr><td><span class="dot" style="background:var(--surface)"></span></td><td class="role">Surface</td><td><span class="var">--surface</span> → Soft Aqua</td></tr>
    <tr><td><span class="dot" style="background:var(--primary)"></span></td><td class="role">Primary</td><td><span class="var">--primary</span> → Ink Teal</td></tr>
    <tr><td><span class="dot" style="background:var(--reward)"></span></td><td class="role">Reward</td><td><span class="var">--reward</span> → Gold Ink (rewards only)</td></tr>
    <tr><td><span class="dot" style="background:var(--success)"></span></td><td class="role">Success</td><td><span class="var">--success</span> → Leaf</td></tr>
    <tr><td><span class="dot" style="background:var(--warn-soft)"></span></td><td class="role">Soft try-again</td><td><span class="var">--warn-soft</span> → Coral (no red)</td></tr>
  </table>
</body></html>
