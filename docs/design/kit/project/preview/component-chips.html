<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; }
  .chip {
    display: inline-flex; align-items: center; gap: 10px;
    height: 56px; padding: 0 22px; border-radius: 999px;
    font-family: var(--font-display); font-weight: 600; font-size: 22px;
  }
  .star { width: 28px; height: 28px; }
  .cap { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="row gap-5 wrap" style="align-items:flex-start">
    <div>
      <div class="chip" style="background: var(--gold-tint); color: var(--gold-ink)">
        <svg class="star" viewBox="0 0 48 48"><path d="M24 4.5l5.6 11.34 12.52 1.82-9.06 8.83 2.14 12.47L24 33.06l-11.2 5.9 2.14-12.47-9.06-8.83 12.52-1.82L24 4.5z" fill="#F2A60C"/></svg>
        +5 stars
      </div>
      <div class="cap">Reward chip · gold ONLY here</div>
    </div>
    <div>
      <div class="chip" style="background: var(--coral-tint); color: #C8462C">Let's try that again</div>
      <div class="cap">Soft try-again · coral, no red</div>
    </div>
    <div>
      <div class="chip" style="background: var(--leaf-tint); color: #1B8358">
        <svg width="22" height="22" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="#3FB984"/><path d="M9.5 16.5l4.5 4.5 8.5-9" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Correct
      </div>
      <div class="cap">Success</div>
    </div>
  </div>
</body></html>
