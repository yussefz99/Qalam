<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="row gap-3 wrap">
    <div class="swatch"><div class="chip" style="background:var(--parchment); border-bottom: 1px solid var(--border-soft)"></div><div class="meta"><div class="name">Parchment</div><div class="hex">#FAF6EE</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--soft-aqua)"></div><div class="meta"><div class="name">Soft Aqua</div><div class="hex">#EAF4F4</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--ink-teal)"></div><div class="meta"><div class="name">Ink Teal</div><div class="hex">#168A8F</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--deep-ink)"></div><div class="meta"><div class="name">Deep Ink</div><div class="hex">#0E5B5F</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--ink-charcoal)"></div><div class="meta"><div class="name">Ink Charcoal</div><div class="hex">#222A2E</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--slate)"></div><div class="meta"><div class="name">Slate</div><div class="hex">#5C6B70</div></div></div>
  </div>
</body></html>
