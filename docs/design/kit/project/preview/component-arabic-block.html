<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .panel { background: #fff; border-radius: var(--radius-xl); padding: 22px 26px; box-shadow: var(--shadow-md); }
  .en { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--deep-ink); margin-bottom: 14px; }
  .ar { font-family: var(--font-arabic); font-weight: 400; font-size: 36px; line-height: 2.0; color: var(--ink-charcoal); direction: rtl; text-align: right; }
  .ar .num { font-family: var(--font-body); font-weight: 700; color: var(--gold-ink); direction: ltr; unicode-bidi: isolate; }
  .meta { display:flex; gap:14px; margin-top: 14px; font-family: var(--font-body); font-size: 12px; color: var(--fg-muted);}
  .pill { background: var(--teal-tint); color: var(--deep-ink); border-radius: 999px; padding: 4px 10px; font-weight:700; letter-spacing:0.04em; text-transform: uppercase;}
</style>
</head>
<body>
  <div class="panel">
    <div class="en">Read aloud — Today's words</div>
    <div class="ar">
      قَلَمٌ · كِتَابٌ · بَيْتٌ <span class="num">3</span>
    </div>
    <div class="meta">
      <span class="pill">dir="rtl"</span>
      <span>Noto Naskh · 36px · line-height 2.0 · tashkeel</span>
    </div>
  </div>
</body></html>
