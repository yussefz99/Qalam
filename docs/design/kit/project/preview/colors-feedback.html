<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="col gap-4">
    <div class="row gap-3 wrap">
      <div class="swatch"><div class="chip" style="background:var(--gold-ink)"></div><div class="meta"><div class="name">Gold Ink</div><div class="hex">#F2A60C</div></div></div>
      <div class="swatch"><div class="chip" style="background:var(--leaf)"></div><div class="meta"><div class="name">Leaf</div><div class="hex">#3FB984</div></div></div>
      <div class="swatch"><div class="chip" style="background:var(--coral)"></div><div class="meta"><div class="name">Coral</div><div class="hex">#FF8A6B</div></div></div>
    </div>
    <div class="row gap-4 center" style="font-family:var(--font-body); font-size:13px; color:var(--fg-muted)">
      <div><span style="color:var(--gold-ink); font-weight:700">●</span> Rewards only</div>
      <div><span style="color:var(--leaf); font-weight:700">●</span> Correct / success</div>
      <div><span style="color:var(--coral); font-weight:700">●</span> Soft "try again" — never red</div>
    </div>
  </div>
</body></html>
