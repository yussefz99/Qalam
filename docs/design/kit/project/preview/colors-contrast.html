<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .pair { display:flex; align-items:center; gap:14px; padding:12px 16px; border-radius:var(--radius-lg); }
  .pair .ratio { font-family: ui-monospace, Menlo, monospace; font-size:12px; opacity:.65; margin-left:auto; }
  .sample { font-family: var(--font-display); font-weight:600; font-size:22px; }
  .sub { font-family: var(--font-body); font-size:14px; }
</style>
</head>
<body>
  <div class="col gap-2">
    <div class="pair" style="background:var(--parchment); border:1px solid var(--border-soft); color:var(--ink-charcoal)">
      <div><div class="sample">Today's Lesson</div><div class="sub">Body on Parchment</div></div>
      <div class="ratio">14.8 : 1  AAA</div>
    </div>
    <div class="pair" style="background:var(--soft-aqua); color:var(--ink-charcoal)">
      <div><div class="sample">Today's Lesson</div><div class="sub">Body on Soft Aqua</div></div>
      <div class="ratio">13.6 : 1  AAA</div>
    </div>
    <div class="pair" style="background:var(--ink-teal); color:#fff">
      <div><div class="sample">Start Lesson</div><div class="sub" style="opacity:.9">White on Ink Teal</div></div>
      <div class="ratio">4.7 : 1  AA</div>
    </div>
    <div class="pair" style="background:var(--parchment); border:1px solid var(--border-soft); color:var(--slate)">
      <div><div class="sample" style="font-weight:500">Layla, grade 3</div><div class="sub">Slate on Parchment</div></div>
      <div class="ratio">5.3 : 1  AA</div>
    </div>
  </div>
</body></html>
