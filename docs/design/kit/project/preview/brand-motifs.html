<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; }
  .stamp { font-family: var(--font-display); font-size: 22px; font-weight:600; color: var(--ink-charcoal); }
  .row-x { display:flex; align-items:center; gap: 18px; }
  .gold { width: 72px; height: 72px; border-radius: 50%; background: var(--gold-ink); display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 0 0 #B97D08; }
  .gold svg { width: 44px; height: 44px; }
  .ink  { width: 72px; height: 72px; border-radius: 50%; background: var(--deep-ink); display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 0 0 #073032; }
  .ink svg { width: 36px; height: 36px; }
  .label { font-family: var(--font-body); font-size: 13px; color: var(--fg-muted); margin-top: 4px;}
  .head { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--fg);}
</style>
</head>
<body>
  <div class="row-x" style="gap:36px">
    <div>
      <div class="row-x">
        <div class="gold"><svg viewBox="0 0 48 48"><path d="M24 4.5l5.6 11.34 12.52 1.82-9.06 8.83 2.14 12.47L24 33.06l-11.2 5.9 2.14-12.47-9.06-8.83 12.52-1.82L24 4.5z" fill="#FBC34A" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
        <div><div class="head">Gold star</div><div class="label">Reward — only celebration moments</div></div>
      </div>
    </div>
    <div>
      <div class="row-x">
        <div class="ink"><svg viewBox="0 0 32 40"><path d="M16 2 C 22 12, 28 19, 28 26 a 12 12 0 0 1 -24 0 C 4 19, 10 12, 16 2 z" fill="#F2A60C"/></svg></div>
        <div><div class="head">Ink drop</div><div class="label">"Magic" motif — flourishes, transitions</div></div>
      </div>
    </div>
  </div>
</body></html>
