<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; }
  .btn-row { display:flex; align-items:center; gap: 16px; flex-wrap: wrap; }
  .btn {
    height: 72px; padding: 0 32px; border-radius: 999px;
    flex-shrink: 0; white-space: nowrap;
    background: var(--ink-teal); color: #fff;
    font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: 0.01em;
    border: none; box-shadow: 0 4px 0 0 var(--deep-ink);
    cursor: pointer; transition: transform var(--dur-fast) var(--ease-out-quart), box-shadow var(--dur-fast) var(--ease-out-quart);
  }
  .btn.pressed { transform: translateY(3px); box-shadow: 0 1px 0 0 var(--deep-ink); }
  .btn.secondary {
    background: #fff; color: var(--deep-ink); box-shadow: 0 4px 0 0 var(--aqua-edge);
  }
  .btn.ghost {
    background: transparent; color: var(--deep-ink); box-shadow: none; border: 2px solid var(--aqua-edge);
  }
  .cap { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); text-align: center; margin-top: 10px; }
</style>
</head>
<body>
  <div class="btn-row">
    <div><button class="btn">Start Lesson</button><div class="cap">Primary · resting</div></div>
    <div><button class="btn pressed">Start Lesson</button><div class="cap">Primary · pressed</div></div>
    <div><button class="btn secondary">Skip for now</button><div class="cap">Secondary</div></div>
    <div><button class="btn ghost">Settings</button><div class="cap">Ghost</div></div>
  </div>
</body></html>
