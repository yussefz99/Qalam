<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row-item { display:flex; align-items:baseline; gap:18px; padding:6px 0; border-bottom:1px dashed var(--border-soft); }
  .row-item:last-child { border-bottom: none; }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--fg-muted); width: 56px; font-family: ui-monospace, Menlo, monospace; }
  .sample { font-family: var(--font-display); font-weight: 600; color: var(--fg); line-height: 1.1; }
  .name { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); margin-left:auto; }
</style>
</head>
<body>
  <div class="col">
    <div class="row-item"><div class="label">56 / 700</div><div class="sample" style="font-size:42px; font-weight:700">Aa</div><div class="name">Hero / celebration</div></div>
    <div class="row-item"><div class="label">42 / 600</div><div class="sample" style="font-size:34px">Today's Lesson</div><div class="name">H1</div></div>
    <div class="row-item"><div class="label">34 / 600</div><div class="sample" style="font-size:28px">Letters &amp; Writing</div><div class="name">H2</div></div>
    <div class="row-item"><div class="label">28 / 500</div><div class="sample" style="font-size:24px; font-weight:500">Trace this letter</div><div class="name">H3</div></div>
    <div class="row-item"><div class="label">24 / 500</div><div class="sample" style="font-size:20px; font-weight:500">Start Lesson</div><div class="name">Button</div></div>
    <div class="row-item"><div class="label">18 / 400</div><div class="sample" style="font-family:var(--font-body); font-size:16px; font-weight:400">Tap a letter to begin tracing it.</div><div class="name">Body</div></div>
  </div>
</body></html>
