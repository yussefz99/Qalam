<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; }
  .lockup { display:flex; align-items:center; gap: 32px; }
  .wm-ar { font-family: var(--font-arabic-display); font-weight: 600; font-size: 110px; color: var(--deep-ink); line-height: 1; direction: rtl; }
  .rule { width: 2px; height: 80px; background: var(--teal-wash); border-radius: 2px;}
  .wm-en { font-family: var(--font-display); font-weight: 600; font-size: 56px; color: var(--deep-ink); letter-spacing: -0.01em; line-height: 1; }
  .tag { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-teal); margin-top: 8px; }
</style>
</head>
<body>
  <div class="lockup">
    <div><div class="wm-ar">قلم</div><div class="tag" style="text-align:right">Arabic · Cairo</div></div>
    <div class="rule"></div>
    <div><div class="wm-en">Qalam</div><div class="tag">English · Fredoka</div></div>
  </div>
</body></html>
