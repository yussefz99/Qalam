<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .tt { background: var(--teal-tint); border:2px dashed var(--ink-teal); border-radius: 20px; display:flex; align-items:center; justify-content:center; font-family: ui-monospace, Menlo, monospace; font-size:12px; color: var(--deep-ink); }
  .label { font-family: var(--font-body); font-weight: 700; font-size: 12px; color: var(--fg); text-align: center; margin-top: 6px; }
</style>
</head>
<body>
  <div class="col gap-3">
    <div style="font-family:var(--font-body); font-size:14px; color:var(--fg-muted); max-width: 560px; line-height: 1.5">
      Kids-UX floor: minimum touch target <strong style="color:var(--fg)">64px</strong>, comfortable <strong style="color:var(--fg)">72px</strong>, hero <strong style="color:var(--fg)">96px</strong>. Always <strong style="color:var(--fg)">≥16px</strong> between targets.
    </div>
    <div class="row gap-4 center">
      <div><div class="tt" style="width:64px; height:64px">64</div><div class="label">min</div></div>
      <div><div class="tt" style="width:72px; height:72px">72</div><div class="label">comfy</div></div>
      <div><div class="tt" style="width:96px; height:96px">96</div><div class="label">hero</div></div>
      <div style="width:16px; height:1px"></div>
      <div style="width:16px; background: repeating-linear-gradient(135deg, var(--coral-tint), var(--coral-tint) 4px, transparent 4px, transparent 8px); height: 96px; border-radius:6px;"></div>
      <div style="font-family:var(--font-body); font-size:12px; color:var(--fg-muted)">↑ ≥16px gap, always</div>
    </div>
  </div>
</body></html>
