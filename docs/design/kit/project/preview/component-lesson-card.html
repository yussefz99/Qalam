<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .card { background: #fff; border-radius: var(--radius-xl); padding: 20px; box-shadow: var(--shadow-md); display:flex; gap: 18px; align-items:center; width: 480px; }
  .glyph {
    width: 84px; height: 84px; border-radius: var(--radius-lg);
    background: var(--soft-aqua); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .glyph div { font-family: var(--font-arabic-display); font-weight: 600; font-size: 56px; color: var(--deep-ink); line-height: 1; direction: rtl; }
  .col-info { display:flex; flex-direction:column; gap: 4px; flex:1;}
  .eyebrow { font-family: var(--font-body); font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-teal); }
  .title   { font-family: var(--font-display); font-weight: 600; font-size: 26px; color: var(--fg); line-height: 1.15; }
  .meta    { font-family: var(--font-body); font-size: 14px; color: var(--fg-muted); }
  .stars { display:flex; gap: 4px; }
  .stars svg { width: 22px; height: 22px; }
</style>
</head>
<body>
  <div class="card">
    <div class="glyph"><div>أ</div></div>
    <div class="col-info">
      <div class="eyebrow">Letters &amp; Writing · Lesson 3</div>
      <div class="title">The letter Alif</div>
      <div class="meta">8 minutes · stroke order &amp; tracing</div>
    </div>
    <div class="stars">
      <svg viewBox="0 0 48 48"><path d="M24 4.5l5.6 11.34 12.52 1.82-9.06 8.83 2.14 12.47L24 33.06l-11.2 5.9 2.14-12.47-9.06-8.83 12.52-1.82L24 4.5z" fill="#F2A60C"/></svg>
      <svg viewBox="0 0 48 48"><path d="M24 4.5l5.6 11.34 12.52 1.82-9.06 8.83 2.14 12.47L24 33.06l-11.2 5.9 2.14-12.47-9.06-8.83 12.52-1.82L24 4.5z" fill="#F2A60C"/></svg>
      <svg viewBox="0 0 48 48"><path d="M24 4.5l5.6 11.34 12.52 1.82-9.06 8.83 2.14 12.47L24 33.06l-11.2 5.9 2.14-12.47-9.06-8.83 12.52-1.82L24 4.5z" fill="#E8DFC9"/></svg>
    </div>
  </div>
</body></html>
