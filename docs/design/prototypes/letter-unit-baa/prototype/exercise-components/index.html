<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qalam — Exercise Components · one engine, config-driven</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/core.css">
<link rel="stylesheet" href="components.css">
<style>
  .appbar{height:62px;flex-shrink:0;display:flex;align-items:center;gap:14px;padding:0 22px;border-bottom:1px solid var(--parchment-edge);}
  .iconbtn{width:44px;height:44px;border-radius:13px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fg-muted);}
  .iconbtn:hover{background:var(--soft-aqua);color:var(--deep-ink);}
  .ab-ttl{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--fg);display:flex;align-items:center;gap:9px;}
  .ab-ttl .g{font-family:var(--font-arabic);font-weight:600;font-size:22px;color:var(--deep-ink);direction:rtl;}
  .ab-ttl em{font-style:normal;color:var(--fg-muted);font-weight:500;font-size:14px;}
  .hw-badge{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--font-body);font-weight:700;font-size:12px;color:var(--deep-ink);
    background:var(--teal-tint);border:1px solid var(--teal-wash);border-radius:999px;padding:7px 13px;}
  .hw-badge svg{width:15px;height:15px;}
  .cfgbtn{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--deep-ink);background:var(--white);
    border:1.5px solid var(--aqua-edge);border-radius:12px;padding:8px 14px;cursor:pointer;}
  .cfgbtn:hover{border-color:var(--ink-teal);color:var(--ink-teal);}
  .cfgbtn.on{background:var(--ink-teal);color:#fff;border-color:var(--ink-teal);}

  .pager{flex-shrink:0;display:flex;align-items:stretch;gap:2px;padding:9px 16px;border-bottom:1px solid var(--parchment-edge);overflow-x:auto;}
  .pchip{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 6px;border-radius:11px;cursor:pointer;border:none;background:transparent;transition:background .15s;}
  .pchip:hover{background:var(--soft-aqua);}
  .pchip.on{background:var(--teal-tint);}
  .pchip .pn{font-family:var(--font-body);font-weight:800;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-muted);}
  .pchip.on .pn{color:var(--ink-teal);}
  .pchip.support .pn{color:#9A6A2E;}
  .pchip .pl{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .pdiv-lbl{display:flex;align-items:center;font-family:var(--font-body);font-weight:800;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#9A6A2E;padding:0 8px;flex-shrink:0;}

  .stagewrap{flex:1;display:flex;min-height:0;position:relative;}
  .ex-host{flex:1;display:flex;min-height:0;}

  /* variant + state controls live in a slim bar under the scaffold foot? No — top-right overlay */
  .controls{position:absolute;top:10px;right:18px;display:flex;align-items:center;gap:8px;z-index:20;}
  .vchip{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--aqua-edge);background:var(--white);border-radius:999px;padding:6px 13px;cursor:pointer;
    font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--fg-muted);box-shadow:var(--shadow-sm);}
  .vchip:hover{border-color:var(--teal-wash);}
  .vchip .va{font-family:var(--font-arabic);color:var(--deep-ink);font-size:16px;direction:rtl;}
  .vchip.on{border-color:var(--ink-teal);background:var(--teal-tint);color:var(--deep-ink);}
  .vlab{font-family:var(--font-body);font-weight:800;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg-muted);}
  .statebar{display:flex;gap:0;background:var(--soft-aqua);border:1px solid var(--aqua-edge);border-radius:11px;padding:3px;box-shadow:var(--shadow-sm);}
  .statebar button{border:none;background:transparent;cursor:pointer;font-family:var(--font-display);font-weight:600;font-size:12.5px;color:var(--fg-muted);padding:6px 12px;border-radius:8px;}
  .statebar button.on{background:var(--white);color:var(--deep-ink);box-shadow:var(--shadow-sm);}

  /* TBD chips row, under scaffold */
  .tbdrow{position:absolute;left:26px;bottom:18px;display:flex;flex-direction:column;align-items:flex-start;gap:7px;width:226px;z-index:15;}
  .tbd{display:inline-flex;align-items:center;gap:7px;background:var(--parchment-deep);border:1px dashed #D9B68A;border-radius:999px;padding:5px 11px;
    font-family:var(--font-body);font-weight:700;font-size:11px;color:#9A6A2E;}
  .tbd .d{width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;}
  .tbd b{color:#7d5520;}

  /* config inspector */
  .inspector{width:0;flex-shrink:0;background:#0E2B2D;overflow:hidden;transition:width .26s var(--ease-out-quart);}
  .inspector.open{width:392px;}
  .insp-in{width:392px;height:100%;display:flex;flex-direction:column;color:#CFE6E6;}
  .insp-head{padding:18px 20px 12px;border-bottom:1px solid rgba(255,255,255,.08);}
  .insp-head .t{font-family:var(--font-display);font-weight:600;font-size:17px;color:#fff;}
  .insp-head .s{font-family:var(--font-body);font-weight:600;font-size:12.5px;color:#7FB0B2;margin-top:3px;line-height:1.4;}
  .insp-body{flex:1;overflow-y:auto;padding:16px 20px 24px;}
  .insp-body::-webkit-scrollbar{width:8px;} .insp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px;}
  .comp-map{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
  .comp{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);}
  .comp.active{background:rgba(22,138,143,.22);border-color:rgba(94,217,221,.4);}
  .comp .cdot{width:9px;height:9px;border-radius:50%;background:#3a5a5c;flex-shrink:0;}
  .comp.active .cdot{background:#5ED9DD;box-shadow:0 0 0 4px rgba(94,217,221,.18);}
  .comp .cn{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12.5px;color:#fff;}
  .comp .cr{margin-left:auto;font-family:var(--font-body);font-weight:600;font-size:11px;color:#7FB0B2;}
  .insp-sec{font-family:var(--font-body);font-weight:800;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#5E8A8C;margin:0 0 8px;}
  pre.cfg{margin:0;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.65;color:#CFE6E6;white-space:pre-wrap;word-break:break-word;}
  pre.cfg .k{color:#7FD8DB;} pre.cfg .s{color:#F3C77A;} pre.cfg .c{color:#6E9698;font-style:italic;}
  .insp-note{margin-top:16px;padding:12px 14px;border-radius:11px;background:rgba(242,166,12,.1);border:1px solid rgba(242,166,12,.22);
    font-family:var(--font-body);font-weight:600;font-size:12.5px;line-height:1.5;color:#F0C98A;}
</style>
</head>
<body>
<div id="fit">
  <div class="stage" data-screen-label="Exercise Components">
    <div class="appbar">
      <button class="iconbtn" id="back" aria-label="Back"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg></button>
      <div class="ab-ttl"><span class="g" dir="rtl">ب</span> Exercise Components <em>· one engine, every question is config</em></div>
      <div class="hw-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l3-1 12-12-2-2L4 18l-1 3z"></path><path d="M16 6l2 2"></path></svg> Handwriting-first</div>
      <button class="cfgbtn" id="cfgToggle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg> Show config</button>
    </div>
    <div class="pager" id="pager"></div>
    <div class="stagewrap">
      <div class="ex-host" id="exHost"></div>
      <div class="controls" id="controls"></div>
      <div class="tbdrow" id="tbdrow"></div>
      <div class="inspector" id="inspector"><div class="insp-in">
        <div class="insp-head"><div class="t">This screen = one config</div><div class="s">The components never change. Only the data below does — that's the whole engine.</div></div>
        <div class="insp-body">
          <div class="insp-sec">Components in use</div>
          <div class="comp-map" id="compMap"></div>
          <div class="insp-sec">The config (data)</div>
          <pre class="cfg" id="cfgJson"></pre>
          <div class="insp-note" id="cfgNote"></div>
        </div>
      </div></div>
    </div>
  </div>
</div>
<script src="../shared/core.js"></script>
<script src="components.js"></script>
<script src="gallery.js"></script>
</body>
</html>
