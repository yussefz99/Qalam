<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qalam — Practice Screen (tutor + writing)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#FAF6EE; --soft-aqua:#EAF4F4; --white:#FFFFFF;
    --aqua-edge:#D6E8E8; --parchment-edge:#E8DFC9; --teal-tint:#DCEEEF;
    --ink-teal:#168A8F; --deep-ink:#0E5B5F; --gold:#F2A60C; --gold-tint:#FCEBC6;
    --leaf:#3FB984; --leaf-tint:#D8F0E5; --coral:#FF8A6B; --coral-tint:#FFE2D9;
    --fg:#222A2E; --fg-muted:#5C6B70;
    --font-display:'Fredoka',system-ui,sans-serif;
    --font-body:'Nunito',system-ui,sans-serif;
    --font-arabic:'Noto Naskh Arabic',serif;
    --shadow-sm:0 1px 0 rgba(14,91,95,0.06),0 2px 6px -2px rgba(14,91,95,0.10);
    --shadow-md:0 2px 0 rgba(14,91,95,0.06),0 8px 18px -8px rgba(14,91,95,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#1c1c1c;font-family:var(--font-body);}
  #fit{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .stage{width:1280px;height:800px;background:var(--parchment);position:relative;
    transform-origin:center center;overflow:hidden;border-radius:18px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,0.55);}

  /* App bar */
  .appbar{height:64px;display:flex;align-items:center;gap:16px;padding:0 28px;
    border-bottom:1px solid var(--parchment-edge);}
  .backbtn{width:44px;height:44px;border-radius:14px;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-muted);}
  .backbtn:hover{background:var(--soft-aqua);}
  .eyebrow{font-family:var(--font-body);font-weight:700;font-size:14px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--fg-muted);}

  .body{display:flex;gap:24px;padding:22px 28px 24px;height:calc(800px - 64px);}

  /* ===== LEFT: the tutor panel ===== */
  .tutor{width:262px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;}
  .mascot-box{height:158px;display:flex;align-items:flex-end;justify-content:center;}
  .mascot-box svg{height:158px;width:auto;display:block;transition:opacity .2s ease;}
  .tutor-id{text-align:center;margin-top:-2px;}
  .tutor-id .nm{font-family:var(--font-display);font-weight:600;font-size:17px;color:var(--deep-ink);}
  .tutor-id .role{font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--fg-muted);margin-top:1px;}

  /* speech bubble = the tutor's voice / feedback */
  .speech{position:relative;background:var(--white);border:1px solid var(--aqua-edge);
    border-radius:18px;padding:15px 16px;box-shadow:var(--shadow-sm);min-height:96px;
    font-family:var(--font-display);font-weight:500;font-size:17px;line-height:1.4;color:var(--fg);
    transition:background .2s ease,border-color .2s ease;}
  .speech::after{content:"";position:absolute;top:-9px;left:38px;transform:rotate(45deg);
    width:16px;height:16px;background:var(--white);border-left:1px solid var(--aqua-edge);
    border-top:1px solid var(--aqua-edge);transition:background .2s ease,border-color .2s ease;}
  .speech .tone{display:block;font-family:var(--font-body);font-weight:800;font-size:11px;
    letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;color:var(--fg-muted);}
  /* tones */
  .speech.coral{background:var(--coral-tint);border-color:#F6C3B5;}
  .speech.coral::after{background:var(--coral-tint);border-color:#F6C3B5;}
  .speech.coral .tone{color:#C2512F;}
  .speech.leaf{background:var(--leaf-tint);border-color:#B7E4CF;}
  .speech.leaf::after{background:var(--leaf-tint);border-color:#B7E4CF;}
  .speech.leaf .tone{color:#1E8A5B;}
  .thinking-dots{display:inline-flex;gap:5px;vertical-align:middle;margin-left:2px;}
  .thinking-dots i{width:7px;height:7px;border-radius:50%;background:var(--ink-teal);opacity:.4;
    animation:blink 1.1s infinite ease-in-out;}
  .thinking-dots i:nth-child(2){animation-delay:.18s;} .thinking-dots i:nth-child(3){animation-delay:.36s;}
  @keyframes blink{0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}

  /* sound section */
  .sound{margin-top:auto;background:var(--soft-aqua);border:1px solid var(--aqua-edge);
    border-radius:18px;padding:14px;}
  .sound .lbl{font-family:var(--font-body);font-weight:800;font-size:11px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--fg-muted);}
  .sound .row{display:flex;align-items:center;gap:12px;margin-top:10px;}
  .sound .glyph{font-family:var(--font-arabic);font-weight:600;font-size:40px;color:var(--deep-ink);
    line-height:1;min-width:46px;text-align:center;}
  .sound .rom{font-family:var(--font-display);font-weight:500;font-size:16px;color:var(--fg);flex:1;}
  .hearbtn{width:56px;height:56px;border-radius:50%;border:none;background:var(--ink-teal);color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    box-shadow:0 4px 0 var(--deep-ink);transition:transform .12s ease,box-shadow .12s ease;}
  .hearbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--deep-ink);}
  .hearbtn.ping{animation:ping .5s ease;}
  @keyframes ping{0%{box-shadow:0 4px 0 var(--deep-ink),0 0 0 0 rgba(22,138,143,.4);}100%{box-shadow:0 4px 0 var(--deep-ink),0 0 0 26px rgba(22,138,143,0);}}

  /* ===== CENTER: writing ===== */
  .center-col{flex:1;display:flex;flex-direction:column;min-width:0;}
  .headline{font-family:var(--font-display);font-weight:600;font-size:33px;color:var(--fg);line-height:1.1;}
  .prog-row{display:flex;align-items:center;gap:26px;margin-top:8px;}
  .prog{font-family:var(--font-body);font-weight:700;font-size:14px;letter-spacing:0.04em;
    text-transform:uppercase;color:var(--fg-muted);display:flex;align-items:center;gap:9px;}
  .pips{display:flex;gap:6px;}
  .pip{width:13px;height:13px;border-radius:50%;border:2px solid var(--aqua-edge);background:transparent;}
  .pip.done{background:var(--gold);border-color:var(--gold);}

  .canvas-wrap{flex:1;margin-top:16px;position:relative;background:var(--white);
    border:1.5px solid var(--aqua-edge);border-radius:28px;box-shadow:var(--shadow-md);overflow:hidden;}
  .canvas-wrap svg.surface{position:absolute;inset:0;width:100%;height:100%;}
  .guide{stroke:var(--aqua-edge);stroke-width:3.4;stroke-linecap:round;fill:none;stroke-dasharray:1 12;}
  .ink{stroke:var(--deep-ink);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;fill:none;
    transition:opacity .2s ease;}
  .startdot-o{fill:var(--gold);} .startdot-i{fill:var(--white);}

  /* ghost cast on canvas (one-shot, triggered by tapping the corner) */
  .ghost{opacity:0;}
  .ghost .gi{stroke:var(--ink-teal);stroke-width:10;stroke-linecap:round;fill:none;
    stroke-dasharray:400;stroke-dashoffset:400;}
  .ghost .gp{fill:var(--gold);}
  .stage.casting .ghost{opacity:.24;}
  .stage.casting .ghost .gi{animation:reveal 1.6s linear forwards;}
  .stage.casting .ghost .gp{animation:penY 1.6s linear forwards;}
  @keyframes reveal{to{stroke-dashoffset:0;}}
  @keyframes penY{from{transform:translateY(0);}to{transform:translateY(400px);}}

  /* corner demo — always present, gentle loop, tap to cast */
  .corner{position:absolute;top:18px;right:18px;width:160px;background:var(--white);
    border:1px solid var(--aqua-edge);border-radius:20px;box-shadow:var(--shadow-md);
    padding:10px;cursor:pointer;transition:transform .14s ease,box-shadow .14s ease;}
  .corner:hover{transform:translateY(-2px);box-shadow:0 6px 22px -8px rgba(14,91,95,.3);}
  .corner:active{transform:translateY(1px);}
  .corner-tag{font-family:var(--font-body);font-weight:800;font-size:11px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--ink-teal);display:flex;align-items:center;gap:6px;margin:2px 2px 7px;}
  .corner-tag .d{width:7px;height:7px;border-radius:50%;background:var(--ink-teal);}
  .corner-canvas{position:relative;width:100%;height:118px;background:var(--soft-aqua);border-radius:12px;overflow:hidden;}
  .corner-canvas svg{position:absolute;inset:0;width:100%;height:100%;}
  .corner .di{stroke:var(--deep-ink);stroke-width:7;stroke-linecap:round;fill:none;
    stroke-dasharray:96;stroke-dashoffset:96;animation:revealSm 2.8s ease-in-out infinite;}
  .corner .dp{fill:var(--gold);animation:penSm 2.8s ease-in-out infinite;}
  @keyframes revealSm{0%{stroke-dashoffset:96;}55%{stroke-dashoffset:0;}80%,100%{stroke-dashoffset:0;}}
  @keyframes penSm{0%{transform:translateY(0);opacity:1;}55%{transform:translateY(88px);opacity:1;}70%{opacity:0;}80%,100%{transform:translateY(88px);opacity:0;}}
  .corner-hint{margin-top:8px;text-align:center;font-family:var(--font-display);font-weight:500;
    font-size:13px;color:var(--fg-muted);display:flex;align-items:center;justify-content:center;gap:6px;}

  .clearbtn{position:absolute;left:18px;bottom:18px;height:46px;padding:0 20px;border-radius:14px;
    border:2px solid var(--aqua-edge);background:rgba(255,255,255,.9);color:var(--fg-muted);
    font-family:var(--font-display);font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;cursor:pointer;}
  .clearbtn:hover{border-color:var(--ink-teal);color:var(--ink-teal);}

  /* bottom action row */
  .actions{margin-top:16px;min-height:64px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .hint{font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--fg-muted);display:flex;align-items:center;gap:9px;}
  .hint .pen{width:9px;height:9px;border-radius:50%;background:var(--ink-teal);}
  .btn-grp{display:flex;gap:14px;margin-left:auto;}
  .btn{height:64px;padding:0 36px;border-radius:18px;font-family:var(--font-display);font-weight:600;
    font-size:21px;display:flex;align-items:center;gap:10px;cursor:pointer;border:none;}
  .btn.primary{background:var(--ink-teal);color:#fff;box-shadow:0 5px 0 var(--deep-ink);
    transition:transform .12s ease,box-shadow .12s ease;}
  .btn.primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--deep-ink);}
  .btn.ghost{background:transparent;border:2px solid var(--ink-teal);color:var(--ink-teal);}
  .btn.ghost:hover{background:var(--teal-tint);}
  .hidden{display:none !important;}

  /* mockup-only state switcher in the dark frame */
  .demobar{position:fixed;left:0;right:0;bottom:0;padding:11px 16px;display:flex;align-items:center;
    justify-content:center;gap:10px;background:rgba(0,0,0,.55);}
  .demobar span{color:#9a9a9a;font-family:var(--font-body);font-size:12.5px;margin-right:6px;}
  .demobar button{background:#2c2c2c;color:#ddd;border:1px solid #444;border-radius:999px;
    font-family:var(--font-body);font-weight:600;font-size:13px;padding:7px 16px;cursor:pointer;}
  .demobar button.on{background:#168A8F;color:#fff;border-color:#168A8F;}
</style>
</head>
<body>
<div id="fit">
  <div class="stage" data-screen-label="Practice · Trace">
    <div class="appbar">
      <button class="backbtn" aria-label="Back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="eyebrow" id="eyebrow">Your Turn · Trace</span>
    </div>

    <div class="body">
      <!-- LEFT: tutor -->
      <div class="tutor">
        <div class="mascot-box" id="mascotBox"></div>
        <div class="tutor-id"><div class="nm">Qalam</div><div class="role">Your Writing Tutor</div></div>
        <div class="speech" id="speech"></div>
        <div class="sound">
          <div class="lbl">Sound</div>
          <div class="row">
            <div class="glyph" dir="rtl">اَلِف</div>
            <div class="rom">“alif”</div>
            <button class="hearbtn" id="hearbtn" aria-label="Hear the letter">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- CENTER: writing -->
      <div class="center-col">
        <div class="headline">Now you trace <span dir="rtl" style="font-family:var(--font-arabic);font-weight:600;">اَلِف</span> — alif.</div>
        <div class="prog-row">
          <span class="prog">Stroke 1 of 1</span>
          <span class="prog">Clean reps <span class="pips" id="pips"><i class="pip done"></i><i class="pip"></i><i class="pip"></i></span></span>
        </div>

        <div class="canvas-wrap">
          <svg class="surface" viewBox="0 0 600 520" preserveAspectRatio="xMidYMid meet">
            <line class="guide" x1="300" y1="60" x2="300" y2="460"></line>
            <path class="ink" id="ink" d="M302 62 Q296 150 300 250 Q303 330 299 372"></path>
            <circle class="startdot-o" cx="300" cy="60" r="13"></circle>
            <circle class="startdot-i" cx="300" cy="60" r="6.5"></circle>
            <g class="ghost">
              <line class="gi" x1="300" y1="60" x2="300" y2="460"></line>
              <circle class="gp" cx="300" cy="60" r="9"></circle>
            </g>
          </svg>

          <div class="corner" id="corner" title="Tap to watch on the canvas">
            <div class="corner-tag"><span class="d"></span>Watch Me</div>
            <div class="corner-canvas">
              <svg viewBox="0 0 120 118" preserveAspectRatio="xMidYMid meet">
                <line x1="60" y1="14" x2="60" y2="110" stroke="#D6E8E8" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 9"></line>
                <line class="di" x1="60" y1="14" x2="60" y2="110"></line>
                <circle cx="60" cy="14" r="6" fill="#F2A60C"></circle>
                <circle cx="60" cy="14" r="3" fill="#EAF4F4"></circle>
                <circle class="dp" cx="60" cy="14" r="5"></circle>
              </svg>
            </div>
            <div class="corner-hint">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
              Tap to show me here
            </div>
          </div>

          <button class="clearbtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Clear
          </button>
        </div>

        <div class="actions" id="actions"></div>
      </div>
    </div>
  </div>
</div>

<div class="demobar">
  <span>Tutor states (mockup):</span>
  <button data-s="coaching" class="on">Coaching</button>
  <button data-s="thinking">Thinking…</button>
  <button data-s="feedback">Feedback</button>
  <button data-s="praise">Praise</button>
</div>

    write:`<svg viewBox="0 0 200 280" aria-label="Qalam writing"><ellipse cx="100" cy="265" rx="60" ry="8" fill="#0E5B5F" opacity="0.10"/><path d="M60 60 Q60 40 100 40 Q140 40 140 60 L140 210 Q140 230 100 230 Q60 230 60 210 Z" fill="#0E5B5F"/><path d="M60 110 Q100 116 140 110" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M60 160 Q100 166 140 160" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M72 60 Q70 130 76 200" stroke="#1a797d" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/><path d="M60 210 L100 270 L140 210 Z" fill="#168A8F"/><path d="M100 230 L100 270" stroke="#F2A60C" stroke-width="2" stroke-linecap="round"/><rect x="70" y="80" width="60" height="60" rx="14" fill="#FAF6EE"/><ellipse cx="86" cy="108" rx="4" ry="6" fill="#222A2E"/><ellipse cx="114" cy="108" rx="4" ry="6" fill="#222A2E"/><circle cx="84.5" cy="105" r="1.6" fill="#fff"/><circle cx="112.5" cy="105" r="1.6" fill="#fff"/><path d="M92 126 Q100 124 108 126" fill="none" stroke="#222A2E" stroke-width="2.5" stroke-linecap="round"/><path d="M58 160 Q44 200 70 215" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><circle cx="70" cy="215" r="8" fill="#0E5B5F"/><path d="M142 160 Q170 200 168 235" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><circle cx="168" cy="235" r="8" fill="#0E5B5F"/><path d="M100 270 Q120 275 140 268" stroke="#F2A60C" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/></svg>`,
    think:`<svg viewBox="0 0 200 280" aria-label="Qalam thinking"><ellipse cx="100" cy="265" rx="60" ry="8" fill="#0E5B5F" opacity="0.10"/><path d="M60 60 Q60 40 100 40 Q140 40 140 60 L140 210 Q140 230 100 230 Q60 230 60 210 Z" fill="#0E5B5F"/><path d="M60 110 Q100 116 140 110" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M60 160 Q100 166 140 160" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M72 60 Q70 130 76 200" stroke="#1a797d" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/><path d="M60 210 L100 270 L140 210 Z" fill="#168A8F"/><rect x="70" y="80" width="60" height="60" rx="14" fill="#FAF6EE"/><circle cx="86" cy="106" r="5" fill="#222A2E"/><circle cx="114" cy="106" r="5" fill="#222A2E"/><circle cx="86" cy="104" r="1.6" fill="#fff"/><circle cx="114" cy="104" r="1.6" fill="#fff"/><path d="M92 124 Q100 122 102 126" fill="none" stroke="#222A2E" stroke-width="2.5" stroke-linecap="round"/><path d="M142 150 Q160 145 135 138" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><circle cx="135" cy="138" r="8" fill="#0E5B5F"/><path d="M58 150 Q42 160 44 178" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><circle cx="44" cy="178" r="8" fill="#0E5B5F"/><circle cx="160" cy="60" r="3" fill="#168A8F" opacity="0.6"/><circle cx="172" cy="46" r="5" fill="#168A8F" opacity="0.8"/><circle cx="186" cy="28" r="7" fill="#168A8F"/></svg>`,
    tryAgain:`<svg viewBox="0 0 200 280" aria-label="Qalam try again"><ellipse cx="100" cy="265" rx="60" ry="8" fill="#0E5B5F" opacity="0.10"/><path d="M60 60 Q60 40 100 40 Q140 40 140 60 L140 210 Q140 230 100 230 Q60 230 60 210 Z" fill="#0E5B5F"/><path d="M60 110 Q100 116 140 110" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M60 160 Q100 166 140 160" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M72 60 Q70 130 76 200" stroke="#1a797d" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/><path d="M60 210 L100 270 L140 210 Z" fill="#168A8F"/><rect x="70" y="80" width="60" height="60" rx="14" fill="#FAF6EE"/><path d="M82 110 Q86 106 90 110" fill="none" stroke="#222A2E" stroke-width="3" stroke-linecap="round"/><path d="M110 110 Q114 106 118 110" fill="none" stroke="#222A2E" stroke-width="3" stroke-linecap="round"/><path d="M88 128 Q100 124 112 128" fill="none" stroke="#222A2E" stroke-width="2.5" stroke-linecap="round"/><circle cx="80" cy="124" r="3" fill="#FF8A6B" opacity="0.7"/><circle cx="120" cy="124" r="3" fill="#FF8A6B" opacity="0.7"/><path d="M58 150 Q42 145 38 165" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><path d="M142 150 Q158 145 162 165" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><circle cx="38" cy="165" r="8" fill="#0E5B5F"/><circle cx="162" cy="165" r="8" fill="#0E5B5F"/></svg>`,
    cheer:`<svg viewBox="0 0 200 280" aria-label="Qalam cheering"><ellipse cx="100" cy="265" rx="60" ry="8" fill="#0E5B5F" opacity="0.10"/><g transform="rotate(-6 100 140)"><path d="M60 60 Q60 40 100 40 Q140 40 140 60 L140 210 Q140 230 100 230 Q60 230 60 210 Z" fill="#0E5B5F"/><path d="M60 110 Q100 116 140 110" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M60 160 Q100 166 140 160" fill="none" stroke="#0a4448" stroke-width="2" opacity="0.5"/><path d="M72 60 Q70 130 76 200" stroke="#1a797d" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/><path d="M60 210 L100 270 L140 210 Z" fill="#168A8F"/><path d="M100 230 L100 270" stroke="#F2A60C" stroke-width="2" stroke-linecap="round"/><rect x="70" y="80" width="60" height="60" rx="14" fill="#FAF6EE"/><path d="M80 108 Q86 100 92 108" fill="none" stroke="#222A2E" stroke-width="3" stroke-linecap="round"/><path d="M108 108 Q114 100 120 108" fill="none" stroke="#222A2E" stroke-width="3" stroke-linecap="round"/><path d="M84 120 Q100 138 116 120" fill="none" stroke="#222A2E" stroke-width="3" stroke-linecap="round"/><circle cx="80" cy="124" r="3" fill="#FF8A6B" opacity="0.7"/><circle cx="120" cy="124" r="3" fill="#FF8A6B" opacity="0.7"/></g><path d="M58 100 Q42 70 48 50" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><path d="M142 100 Q158 70 152 50" stroke="#0E5B5F" stroke-width="10" stroke-linecap="round" fill="none"/><circle cx="48" cy="50" r="8" fill="#0E5B5F"/><circle cx="152" cy="50" r="8" fill="#0E5B5F"/><circle cx="32" cy="40" r="4" fill="#F2A60C"/><circle cx="170" cy="34" r="5" fill="#F2A60C"/><circle cx="20" cy="120" r="3" fill="#F2A60C"/><circle cx="180" cy="130" r="3" fill="#F2A60C"/></svg>`
  };

  const INK = {
    partial:"M302 62 Q296 150 300 250 Q303 330 299 372",
    full:"M302 62 Q296 150 300 250 Q303 350 300 458",
    short:"M301 62 Q298 110 300 168"
  };

  const STATES = {
    coaching:{ pose:'idle', eyebrow:'Your Turn · Trace', tone:null, toneLabel:'',
      text:'Take your time. Start at the gold dot and bring it straight down.',
      ink:'partial', pips:1, hint:'Lift your pen when you finish the stroke.', buttons:[] },
    thinking:{ pose:'think', eyebrow:'Checking', tone:null, toneLabel:'',
      html:'Let me look at your alif <span class="thinking-dots"><i></i><i></i><i></i></span>',
      ink:'full', pips:1, hint:'', buttons:[] },
    feedback:{ pose:'tryAgain', eyebrow:'Let’s Fix It Together', tone:'coral', toneLabel:'Qalam says',
      text:'Your alif is a little short — start higher and bring it all the way down.',
      ink:'short', pips:1, hint:'', buttons:[{label:'Show Me Again',kind:'ghost',act:'cast'},{label:'Try Again',kind:'primary'}] },
    praise:{ pose:'cheer', eyebrow:'Nice', tone:'leaf', toneLabel:'Qalam says',
      text:'Beautiful — straight and tall. أحسنت!',
      ink:'full', pips:2, hint:'', buttons:[{label:'Keep Going',kind:'primary'}] }
  };

  const mascotBox=document.getElementById('mascotBox');
  const speech=document.getElementById('speech');
  const eyebrow=document.getElementById('eyebrow');
  const ink=document.getElementById('ink');
  const actions=document.getElementById('actions');
  const pips=document.getElementById('pips');
  const stage=document.querySelector('.stage');

  function render(key){
    const s=STATES[key];
    mascotBox.innerHTML=M[s.pose];
    eyebrow.textContent=s.eyebrow;
    speech.className='speech'+(s.tone?(' '+s.tone):'');
    speech.innerHTML=(s.toneLabel?'<span class="tone">'+s.toneLabel+'</span>':'')+(s.html||s.text);
    ink.setAttribute('d',INK[s.ink]);
    ink.style.opacity = key==='thinking' ? '0.55' : '1';
    [...pips.children].forEach((p,i)=>p.classList.toggle('done',i<s.pips));
    // actions
    let h='';
    if(s.hint) h+='<div class="hint"><span class="pen"></span>'+s.hint+'</div>';
    if(s.buttons.length){ h+='<div class="btn-grp">'; s.buttons.forEach(b=>{
      h+='<button class="btn '+b.kind+'" '+(b.act?('data-act="'+b.act+'"'):'')+'>'+b.label+'</button>';}); h+='</div>'; }
    actions.innerHTML=h;
    actions.querySelectorAll('[data-act="cast"]').forEach(b=>b.addEventListener('click',cast));
  }

  function cast(){
    if(stage.classList.contains('casting')) return;
    const prev=document.querySelector('.demobar button.on')?.dataset.s||'coaching';
    mascotBox.innerHTML=M.write;
    speech.className='speech';
    speech.innerHTML='Watch — start at the dot and come all the way down.';
    stage.classList.add('casting');
    setTimeout(()=>{ stage.classList.remove('casting'); render(prev); },1750);
  }

  document.getElementById('corner').addEventListener('click',cast);
  document.getElementById('hearbtn').addEventListener('click',e=>{
    e.currentTarget.classList.remove('ping'); void e.currentTarget.offsetWidth; e.currentTarget.classList.add('ping');
  });
  document.querySelectorAll('.demobar button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.demobar button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); render(b.dataset.s);
  }));

  function fit(){const pad=48;const s=Math.min((innerWidth-pad)/1280,(innerHeight-pad-52)/800,1);stage.style.transform='scale('+s+')';}
  addEventListener('resize',fit); fit(); render('coaching');
</script>
</body>
